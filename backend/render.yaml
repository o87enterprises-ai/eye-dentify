services:
  - type: web
    name: eye-dentify-api
    env: docker
    dockerfilePath: ./Dockerfile.render
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: eye-dentify-db
          property: connectionString
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: eye-dentify-db
          property: connectionString
      - key: API_PREFIX
        value: /api/v1
      - key: STORAGE_BASE
        value: /data
      - key: FRAMES_DIR
        value: /data/frames
      - key: FEATURES_DIR
        value: /data/features
      - key: INDEX_DIR
        value: /data/index
      - key: VIDEOS_DIR
        value: /data/videos

databases:
  - name: eye-dentify-db
    plan: free
    databaseName: eyedentify
